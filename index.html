<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WasuChat | WasuTok Edition</title>
    
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800;900&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --primary: #ff007f; --secondary: #00f2ff; --accent: #ffff00; --bg-glass: rgba(255, 255, 255, 0.95); --border: 4px solid #000; }
        body { background: linear-gradient(-45deg, #ff99cc, #ffcce6, #66ffff, #b3ffff); background-size: 400% 400%; animation: gradientBG 15s ease infinite; color: #222; font-family: 'M PLUS Rounded 1c', sans-serif; height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        @keyframes gradientBG { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }

        #login-screen { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .avatar-upload-container { position: relative; margin-bottom: 20px; cursor: pointer; transition: transform 0.2s; }
        .avatar-preview { width: 130px; height: 130px; border-radius: 50%; border: 5px solid #000; object-fit: cover; background: #eee; box-shadow: 5px 5px 0px var(--primary); }
        .avatar-badge { position: absolute; bottom: 0; right: 0; background: var(--secondary); border: 3px solid #000; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; box-shadow: 2px 2px 0px #000; }
        .login-input { border: 4px solid #000; padding: 15px; border-radius: 15px; font-size: 1.2rem; font-weight: 900; text-align: center; margin-bottom: 20px; outline: none; width: 80%; max-width: 250px; box-shadow: inset 3px 3px 0px rgba(0,0,0,0.1); }
        .btn-entrar { background: var(--primary); color: white; border: 4px solid #000; padding: 15px 40px; font-size: 1.2rem; font-weight: 900; border-radius: 15px; cursor: pointer; box-shadow: 6px 6px 0px #000; }
        
        header { background: white; border-bottom: 5px solid #000; padding: 10px 15px; display: none; justify-content: space-between; align-items: center; z-index: 100; }
        .title { font-family: 'M PLUS Rounded 1c', sans-serif; font-weight: 900; font-size: 1.6rem; text-transform: uppercase; animation: fiestaWasu 1.5s infinite alternate ease-in-out; }
        @keyframes fiestaWasu { 0% { transform: scale(1) translateY(0px) rotate(-3deg); color: #ffff00; } 100% { transform: scale(1.05) translateY(2px) rotate(3deg); color: #00f2ff; } }

        #main-content { display: none; flex: 1; overflow: hidden; width: 100%; position: relative; }
        
        /* --- ESTILOS WASUTOK CORREGIDOS PARA ANDROID --- */
        #wasutok-section { display: none; width: 100%; height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; background: #000; position: relative; }
        #wasutok-feed { display: flex; flex-direction: column; height: 100%; } /* Corregido: height 100% */
        .v-tok-container { width: 100%; height: 100%; scroll-snap-align: start; position: relative; border-bottom: 2px solid #222; flex-shrink: 0; } /* Corregido: height 100% y flex-shrink */
        .v-tok-video { width: 100%; height: 100%; object-fit: contain; }
        .v-tok-info { position: absolute; bottom: 30px; left: 15px; color: white; text-shadow: 2px 2px 5px #000; z-index: 10; }
        
        .v-tok-name { font-weight: 900; font-size: 1.3rem; margin-bottom: 5px; color: var(--secondary); cursor: pointer; transition: 0.2s; display: inline-block; padding: 5px 10px; background: rgba(0,0,0,0.5); border-radius: 10px; border: 2px solid var(--secondary); }
        .v-tok-name:active { transform: scale(0.95); background: var(--primary); border-color: #000; }

        /* BARRA LATERAL DE ACCIONES (TikTok Style) */
        .v-tok-actions { position: absolute; right: 15px; bottom: 80px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 20; }
        
        /* BOTÓN ME GUSTA */
        .btn-like { background: rgba(0,0,0,0.6); color: white; border: 3px solid #000; border-radius: 50%; width: 50px; height: 50px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; box-shadow: 2px 2px 0px #000; }
        .btn-like i { font-style: normal; font-size: 1.2rem; margin-bottom: -2px; }
        .btn-like span { font-size: 0.75rem; font-weight: 900; }
        .btn-like.liked { background: var(--primary); transform: scale(1.1); box-shadow: 0px 0px 10px var(--primary); border-color: #fff; }
        
        /* BOTÓN ELIMINAR */
        .btn-delete-vid { background: #ff3333; color: white; border: 3px solid #000; border-radius: 50%; width: 50px; height: 50px; font-size: 1.2rem; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 2px 2px 0px #000; }
        .btn-delete-vid:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #000; }

        /* --- BARRA DE NAVEGACIÓN Y BOTÓN CORREGIDOS --- */
        #bottom-nav { background: #fff; border-top: 5px solid #000; height: 70px; display: none; justify-content: space-around; align-items: center; flex-shrink: 0; z-index: 200; padding-bottom: env(safe-area-inset-bottom); } /* Corregido: safe-area para Android */
        .nav-btn { display: flex; flex-direction: column; align-items: center; cursor: pointer; font-weight: 900; font-size: 0.8rem; color: #666; transition: 0.2s; }
        .nav-btn.active { color: var(--primary); transform: scale(1.1); }
        .nav-btn i { font-size: 1.5rem; font-style: normal; margin-bottom: 3px; }

        /* Botón de subir videos movido más arriba para no chocar */
        #btn-upload-tok { position: fixed; bottom: 95px; right: 20px; background: var(--accent); border: 3px solid #000; width: 60px; height: 60px; border-radius: 50%; font-size: 2rem; font-weight: 900; display: none; align-items: center; justify-content: center; box-shadow: 4px 4px 0px #000; z-index: 500; cursor: pointer; }

        #chat-container { flex: 1; display: flex; flex-direction: column; background: var(--bg-glass); width: 100%; height: 100%; }
        .chat-nav { background: #000; color: #fff; padding: 10px; display: flex; justify-content: space-between; align-items: center; font-weight: 900; border-bottom: 4px solid #000;}
        .btn-regresar, .btn-chats-list { background: var(--secondary); color: #000; border: 2px solid #fff; padding: 5px 10px; border-radius: 8px; font-weight: 900; cursor: pointer; }
        .btn-regresar { background: var(--accent); display: none; }

        #messages-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { padding: 10px 15px; border: 3px solid #000; border-radius: 15px; font-weight: 700; position: relative; box-shadow: 4px 4px 0px #000; word-wrap: break-word; font-size: 1rem;}
        .msg-own { align-self: flex-end; align-items: flex-end; }
        .msg-own .msg-bubble { background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .msg-other { align-self: flex-start; }
        .msg-other .msg-bubble { background: white; border-bottom-left-radius: 2px; color: #000;}

        #chats-list-overlay { position: absolute; inset: 0; background: white; z-index: 100; display: none; flex-direction: column; padding: 20px; }
        #chats-list-overlay.active { display: flex; }
        .contact-item { display: flex; align-items: center; gap: 15px; padding: 12px; border: 3px solid #000; border-radius: 15px; margin-bottom: 10px; cursor: pointer; background: #f9f9f9; }
        .contact-item img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #000; }

        .input-bar { background: white; border-top: 5px solid #000; padding: 10px; display: flex; align-items: center; gap: 8px; }
        .input-field { flex: 1; border: 3px solid #000; padding: 10px 12px; border-radius: 15px; font-weight: 700; outline: none;}
        .btn-action { background: var(--secondary); border: 3px solid #000; width: 45px; height: 45px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; box-shadow: 3px 3px 0px #000; }
        .btn-enviar-msg { background: var(--primary); color: white; border: 3px solid #000; padding: 0 15px; height: 45px; border-radius: 12px; font-weight: 900; cursor: pointer; box-shadow: 3px 3px 0px #000; }

        .popup-panel { background: #f9f9f9; border-top: 4px solid #000; display: none; height: 320px; overflow-y: auto; padding: 10px;}
        .popup-panel.active { display: flex; flex-direction: column; }
        .grid-sticker { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; justify-items: center; }
        .sticker-item { width: 100%; height: 90px; object-fit: cover; border-radius: 10px; border: 2px solid #000; cursor: pointer; background: white; }

        .media-menu { background: white; border-top: 4px solid #000; padding: 15px; display: none; flex-direction: column; gap: 10px; }
        .media-menu.show { display: flex; }
        .media-opt { background: #eee; border: 2px solid #000; padding: 12px 15px; border-radius: 8px; font-weight: 900; cursor: pointer; }

        #toast-container { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 400px; }
        .toast-notif { background: var(--secondary); border: 3px solid #000; padding: 10px 15px; border-radius: 15px; box-shadow: 5px 5px 0px #000; display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 900; animation: fadeInUp 0.3s forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <audio id="audio-notif" src="https://assets.mixkit.co/sfx/preview/mixkit-software-interface-back-2575.mp3" preload="auto"></audio>
    <div id="toast-container"></div>

    <div id="login-screen">
        <h1 class="title" style="margin-bottom: 20px;">✨ WASUCHAT ✨</h1>
        <label for="avatar-input" class="avatar-upload-container">
            <img id="avatar-preview" class="avatar-preview" src="https://api.dicebear.com/7.x/adventurer/svg?seed=Wasu">
            <div class="avatar-badge">📷</div>
        </label>
        <input type="file" id="avatar-input" hidden accept="image/*" onchange="comprimirYMostrarAvatar(event)">
        <input type="text" id="apodo-input" class="login-input" placeholder="Tu Apodo..." maxlength="15">
        <button class="btn-entrar" onclick="ingresarGremio()">ENTRAR</button>
    </div>

    <header id="app-header">
        <div class="title" style="font-size: 1.2rem;">✨ WASUCHAT ✨</div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <div id="user-info" style="display: flex; align-items: center; gap: 10px; font-weight: 800;"></div>
            <button onclick="salirGremio()" style="background:#ff3333; color:white; border:2px solid #000; padding:5px 10px; border-radius:8px; font-weight:900; cursor:pointer;">Salir</button>
        </div>
    </header>

    <div id="main-content">
        <section id="wasutok-section">
            <div id="wasutok-feed"></div>
        </section>

        <div id="chats-list-overlay">
            <div class="list-header">
                <h2 style="font-weight: 900;">📩 MIS CHATS</h2>
                <button class="btn-regresar" style="display:block;" onclick="toggleChatsList(false)">CERRAR</button>
            </div>
            <div id="contacts-container"></div>
        </div>

        <section id="chat-container">
            <div class="chat-nav">
                <span id="titulo-sala">SALA GLOBAL</span>
                <div style="display: flex; gap: 10px;">
                    <button id="btn-chats" class="btn-chats-list" onclick="toggleChatsList(true)">📩 CHATS</button>
                    <button id="btn-regresar" class="btn-regresar" onclick="cambiarAChatGlobal()">🌍 VOLVER</button>
                </div>
            </div>
            <div id="messages-box"></div>
            <div class="input-bar">
                <button class="btn-action" onclick="toggleMenu('media')">➕</button>
                <button class="btn-action" style="background:var(--accent)" onclick="toggleMenu('emoji')">😀</button>
                <input type="text" id="chat-input" class="input-field" placeholder="Escribe..." autocomplete="off">
                <button class="btn-enviar-msg" onclick="enviarTextoBoton()">➤</button>
            </div>
            <div id="global-popups" class="popup-panel"></div>
            <div id="global-media-menu" class="media-menu">
                <div class="media-opt" onclick="togglePopupInside('sticker')">🌟 Buscar GIFs</div>
                <div class="media-opt" onclick="document.getElementById('img-input').click()">🖼️ Subir Foto</div>
            </div>
            <input type="file" id="img-input" hidden accept="image/*" onchange="subirArchivoCloudinary(this, 'image')">
        </section>
    </div>

    <div id="btn-upload-tok" onclick="document.getElementById('video-input').click()">➕</div>
    <input type="file" id="video-input" hidden accept="video/*" onchange="subirArchivoCloudinary(this, 'video_tok')">

    <nav id="bottom-nav">
        <div class="nav-btn" onclick="switchTab('wasutok')" id="tab-wasutok"><i>🎬</i>WASUTOK</div>
        <div class="nav-btn active" onclick="switchTab('chat')" id="tab-chat"><i>💬</i>CHAT</div>
    </nav>

    <script>
        // ==========================================
        // ⚙️ TUS DATOS DE CLOUDINARY
        // ==========================================
        const CLOUDINARY_CLOUD_NAME = "drfsm6hr0"; 
        const CLOUDINARY_UPLOAD_PRESET = "wasu_preset"; 
        // ==========================================

        const socket = io('https://servidor-otaku.onrender.com');

        let localUid = localStorage.getItem('otaku_uid') || 'user_' + Math.random().toString(36).substr(2, 9);
        let userAlias = localStorage.getItem('otaku_alias');
        let userPhoto = localStorage.getItem('otaku_avatar');
        let currentChatMode = "global";
        let targetUid = "";
        let mensajesGlobales = [];
        let chatsPrivados = {}; 
        
        // Memoria local de Likes
        let misLikes = JSON.parse(localStorage.getItem('mis_likes_wasu')) || [];
        let conteoLikes = {}; // Objeto que guarda el número de likes por URL de video

        window.onload = () => { if (userAlias) mostrarInterfazPrincipal(); };

        function comprimirYMostrarAvatar(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => { document.getElementById('avatar-preview').src = e.target.result; userPhoto = e.target.result; };
            reader.readAsDataURL(file);
        }

        function ingresarGremio() {
            const inputApodo = document.getElementById('apodo-input').value.trim();
            if (!inputApodo) return alert("¡Pon un apodo!");
            userAlias = inputApodo;
            if(!userPhoto) userPhoto = `https://api.dicebear.com/7.x/adventurer/svg?seed=${userAlias}`;
            localStorage.setItem('otaku_uid', localUid);
            localStorage.setItem('otaku_alias', userAlias);
            localStorage.setItem('otaku_avatar', userPhoto);
            mostrarInterfazPrincipal();
        }

        function mostrarInterfazPrincipal() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('main-content').style.display = 'flex';
            document.getElementById('bottom-nav').style.display = 'flex';
            document.getElementById('user-info').innerHTML = `<img src="${userPhoto}" style="width:35px;height:35px;border-radius:50%;border:2px solid #000;object-fit:cover;">`;
            socket.emit('registrar_usuario', { uid: localUid, alias: userAlias });
            cambiarAChatGlobal();
        }

        function salirGremio() { localStorage.clear(); window.location.reload(); }

        function switchTab(tab) {
            if(tab === 'wasutok') {
                document.getElementById('chat-container').style.display = 'none';
                document.getElementById('wasutok-section').style.display = 'block';
                document.getElementById('tab-wasutok').classList.add('active');
                document.getElementById('tab-chat').classList.remove('active');
                document.getElementById('btn-upload-tok').style.display = 'flex';
                cerrarTodosPaneles();
            } else {
                document.getElementById('chat-container').style.display = 'flex';
                document.getElementById('wasutok-section').style.display = 'none';
                document.getElementById('tab-chat').classList.add('active');
                document.getElementById('tab-wasutok').classList.remove('active');
                document.getElementById('btn-upload-tok').style.display = 'none';
                scrollToBottom();
            }
        }

        async function subirArchivoCloudinary(input, tipo) {
            const file = input.files[0];
            if(!file) return;
            
            if(tipo === 'video_tok' && file.size > 20000000) return alert("Video demasiado grande (Máx 20MB)");
            
            let btn;
            if(tipo === 'video_tok') {
                btn = document.getElementById('btn-upload-tok');
                btn.innerText = "⏳";
            } else {
                cerrarTodosPaneles();
            }

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if(data.secure_url) {
                    enviarCore(data.secure_url, tipo);
                    if(tipo === 'video_tok') alert("¡Video compartido en WasuTok!");
                } else {
                    console.error("Cloudinary Error:", data);
                    alert("Error al subir. ¿Creaste el preset como 'Unsigned'?");
                }
            } catch (e) { 
                alert("Error de red al subir el archivo."); 
            }

            if(tipo === 'video_tok') btn.innerText = "➕";
        }

        function eliminarVideo(url) {
            if(confirm("¿Seguro que quieres eliminar este video?")) {
                socket.emit('mensaje_global', { text: url, type: 'delete_video', uid: localUid, autorNombre: userAlias });
                const videos = document.querySelectorAll(`.v-tok-container[data-url="${url}"]`);
                videos.forEach(v => v.remove());
            }
        }

        // ==========================================
        // ❤️ LÓGICA DE ME GUSTA
        // ==========================================
        function darMeGusta(url) {
            if(misLikes.includes(url)) return; // Si ya dio like, no hace nada
            
            misLikes.push(url);
            localStorage.setItem('mis_likes_wasu', JSON.stringify(misLikes));
            
            // Actualizamos la pantalla al instante sumando 1
            actualizarDOM_Like(url, (conteoLikes[url] || 0) + 1);
            
            // Avisamos al servidor para que actualice a los demás
            socket.emit('mensaje_global', { text: url, type: 'like_video', uid: localUid, autorNombre: userAlias });
        }

        function actualizarDOM_Like(url, total) {
            conteoLikes[url] = total; // Guardar el conteo
            const contenedores = document.querySelectorAll(`.v-tok-container[data-url="${url}"]`);
            contenedores.forEach(c => {
                const countSpan = c.querySelector('.like-count');
                const btnLike = c.querySelector('.btn-like');
                if(countSpan) countSpan.innerText = total;
                // Pinta de rosa si ya le dio like
                if(misLikes.includes(url) && btnLike) btnLike.classList.add('liked');
            });
        }
        // ==========================================

        function agregarVideoFeed(m, isNew = false) {
            const feed = document.getElementById('wasutok-feed');
            const isMe = m.uid === localUid; 
            const likesActuales = conteoLikes[m.text] || 0;
            const hasLiked = misLikes.includes(m.text) ? 'liked' : '';

            const html = `
            <div class="v-tok-container" data-url="${m.text}">
                <video class="v-tok-video" src="${m.text}" loop onclick="this.paused ? this.play() : this.pause()"></video>
                <div class="v-tok-info">
                    <div class="v-tok-name" onclick="abrirPrivado('${m.uid}', '${m.autorNombre}')">
                        @${m.autorNombre.toUpperCase()} 💬
                    </div>
                    <div>🎬 ¡Mira mi nuevo video!</div>
                </div>
                
                <div class="v-tok-actions">
                    <div class="btn-like ${hasLiked}" onclick="darMeGusta('${m.text}')">
                        <i>❤️</i>
                        <span class="like-count">${likesActuales}</span>
                    </div>
                    ${isMe ? `<div class="btn-delete-vid" onclick="eliminarVideo('${m.text}')">🗑️</div>` : ''}
                </div>
            </div>`;
            
            if(isNew) feed.insertAdjacentHTML('afterbegin', html);
            else feed.insertAdjacentHTML('beforeend', html);
        }

        socket.on('historial_global', (h) => { 
            const eliminados = h.filter(m => m.type === 'delete_video').map(m => m.text);
            mensajesGlobales = h.filter(m => m.type !== 'video_tok' && m.type !== 'delete_video' && m.type !== 'like_video');
            const videosTok = h.filter(m => m.type === 'video_tok' && !eliminados.includes(m.text));
            
            // Procesar historial de likes antes de dibujar videos
            conteoLikes = {};
            h.filter(m => m.type === 'like_video').forEach(l => {
                conteoLikes[l.text] = (conteoLikes[l.text] || 0) + 1;
            });
            
            if(currentChatMode === 'global') renderizarPantalla(mensajesGlobales); 
            
            const feed = document.getElementById('wasutok-feed');
            feed.innerHTML = '';
            videosTok.reverse().forEach(v => agregarVideoFeed(v));
        });

        socket.on('nuevo_mensaje_global', (m) => { 
            if(m.type === 'video_tok') {
                agregarVideoFeed(m, true);
            } else if (m.type === 'delete_video') {
                const videos = document.querySelectorAll(`.v-tok-container[data-url="${m.text}"]`);
                videos.forEach(v => v.remove());
            } else if (m.type === 'like_video') {
                // Alguien le dio like, sumar 1 si no fui yo (yo ya lo sumé)
                if(m.uid !== localUid) {
                    actualizarDOM_Like(m.text, (conteoLikes[m.text] || 0) + 1);
                }
            } else {
                mensajesGlobales.push(m); 
                if(currentChatMode === 'global') renderizarUnMensaje(m); 
            }
        });

        socket.on('nuevo_mensaje_privado', (msg) => {
            const otroUid = msg.uid === localUid ? msg.targetUid : msg.uid;
            if(!chatsPrivados[otroUid]) {
                chatsPrivados[otroUid] = { nombre: (msg.uid === localUid) ? "Chat" : msg.autorNombre, foto: (msg.uid === localUid) ? "https://api.dicebear.com/7.x/adventurer/svg?seed="+otroUid : msg.autorFoto, msgs: [] };
            }
            chatsPrivados[otroUid].msgs.push(msg);
            if(currentChatMode === 'privado' && targetUid === otroUid) renderizarUnMensaje(msg);
        });

        socket.on('alerta_privada', (data) => {
            if (currentChatMode !== "privado" || targetUid !== data.deUid) {
                document.getElementById('audio-notif').play().catch(e=>e);
                const toast = document.createElement('div'); toast.className = 'toast-notif';
                toast.innerHTML = `<img src="${data.deFoto}" style="width:30px;height:30px;border-radius:50%;border:2px solid #000;"> <span>NUEVO MENSAJE DE ${data.deNombre}</span>`;
                toast.onclick = () => { abrirPrivado(data.deUid, data.deNombre); toast.remove(); };
                document.getElementById('toast-container').appendChild(toast);
                setTimeout(() => toast.remove(), 4000);
            }
        });

        function toggleChatsList(show) {
            const overlay = document.getElementById('chats-list-overlay');
            const container = document.getElementById('contacts-container');
            if(show) {
                container.innerHTML = '';
                const uids = Object.keys(chatsPrivados);
                if(uids.length === 0) container.innerHTML = '<p style="text-align:center; font-weight:700; margin-top:20px;">No hay chats... 🌸</p>';
                uids.forEach(uid => {
                    const info = chatsPrivados[uid];
                    const item = document.createElement('div'); item.className = 'contact-item';
                    item.innerHTML = `<img src="${info.foto}"> <div class="contact-info" style="font-weight:900; font-size:1.1rem;">${info.nombre}</div>`;
                    item.onclick = () => { abrirPrivado(uid, info.nombre); toggleChatsList(false); };
                    container.appendChild(item);
                });
                overlay.classList.add('active');
            } else { overlay.classList.remove('active'); }
        }

        function cambiarAChatGlobal() {
            currentChatMode = "global"; targetUid = "";
            document.getElementById('titulo-sala').innerText = "SALA GLOBAL";
            document.getElementById('btn-regresar').style.display = "none";
            document.getElementById('btn-chats').style.display = "block";
            renderizarPantalla(mensajesGlobales);
        }

        function abrirPrivado(uid, nombre) {
            if (uid === localUid) return; // No abrir chat contigo mismo
            currentChatMode = "privado"; targetUid = uid;
            document.getElementById('titulo-sala').innerText = "🔒 " + nombre.toUpperCase();
            document.getElementById('btn-regresar').style.display = "block";
            document.getElementById('btn-chats').style.display = "none";
            if(!chatsPrivados[uid]) chatsPrivados[uid] = { nombre: nombre, foto: '', msgs: [] };
            renderizarPantalla(chatsPrivados[uid].msgs);
            
            switchTab('chat');
        }

        function renderizarPantalla(lista) {
            const box = document.getElementById('messages-box'); box.innerHTML = '';
            lista.forEach(m => renderizarUnMensaje(m, false));
            box.scrollTop = box.scrollHeight;
        }

        function renderizarUnMensaje(d, scroll = true) {
            const box = document.getElementById('messages-box');
            const isMe = d.uid === localUid;
            let content = d.text;
            if (d.type === 'image' || d.type === 'sticker') content = `<img src="${d.text}" style="width:100%; border-radius:10px; border:2px solid #000;">`;
            box.innerHTML += `<div class="msg-container ${isMe ? 'msg-own' : 'msg-other'}">
                ${!isMe ? `<span style="font-size:0.75rem; font-weight:900; margin-bottom:2px; cursor:pointer;" onclick="abrirPrivado('${d.uid}','${d.autorNombre}')">${d.autorNombre}</span>` : ''}
                <div class="msg-bubble">${content}</div>
            </div>`;
            if(scroll) box.scrollTop = box.scrollHeight;
        }

        function scrollToBottom() { const box = document.getElementById('messages-box'); box.scrollTop = box.scrollHeight; }

        function enviarTextoBoton() { enviarCore(document.getElementById('chat-input').value, 'text'); }
        function enviarCore(content, type) {
            if (!content.trim()) return;
            const data = { text: content, type: type, uid: localUid, autorNombre: userAlias, autorFoto: userPhoto };
            if (currentChatMode === "global") socket.emit('mensaje_global', data);
            else { data.targetUid = targetUid; socket.emit('mensaje_privado', data); }
            if (type === 'text') document.getElementById('chat-input').value = "";
            cerrarTodosPaneles();
        }

        function cerrarTodosPaneles() { document.getElementById('global-popups').classList.remove('active'); document.getElementById('global-media-menu').classList.remove('show'); }
        function toggleMenu(m) {
            if (m === 'media') document.getElementById('global-media-menu').classList.toggle('show');
            else togglePopupInside('emoji');
        }

        function togglePopupInside(type) {
            const panel = document.getElementById('global-popups'); panel.innerHTML = '';
            if (type === 'emoji') {
                const picker = document.createElement('emoji-picker');
                picker.addEventListener('emoji-click', e => document.getElementById('chat-input').value += e.detail.unicode);
                panel.appendChild(picker);
            } else {
                panel.innerHTML = `<div class="grid-sticker" id="g-res"></div>`;
                fetch(`https://g.tenor.com/v1/search?q=anime&key=LIVDSRZULELA&limit=12`)
                .then(r => r.json()).then(data => {
                    data.results.forEach(gif => {
                        const img = document.createElement('img'); img.src = gif.media[0].gif.url; img.className = 'sticker-item';
                        img.onclick = () => { enviarCore(img.src, 'sticker'); cerrarTodosPaneles(); };
                        document.getElementById('g-res').appendChild(img);
                    });
                });
            }
            panel.classList.add('active');
        }
    </script>
</body>
</html>
